{{- if and .Values.postgres.enabled (not .Values.externalDatabaseUrl) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "observaai.postgres.fullname" . }}
  labels:
    {{- include "observaai.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.postgres.port }}
      targetPort: {{ .Values.postgres.port }}
      name: postgres
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: postgres
{{- end }}
