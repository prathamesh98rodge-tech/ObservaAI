apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observaai.gateway.fullname" . }}
  labels:
    {{- include "observaai.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: gateway
    spec:
      {{- if and .Values.postgres.enabled (not .Values.externalDatabaseUrl) }}
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ include "observaai.postgres.fullname" . }} {{ .Values.postgres.port }}; do echo "waiting for postgres..."; sleep 2; done']
      {{- end }}
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.gateway.port }}
              name: http
          envFrom:
            - secretRef:
                name: {{ include "observaai.name" . }}-secrets
          env:
            {{- range $k, $v := .Values.gateway.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
