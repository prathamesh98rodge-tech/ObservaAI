apiVersion: v1
kind: Secret
metadata:
  name: {{ include "observaai.name" . }}-secrets
  labels:
    {{- include "observaai.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "observaai.databaseUrl" . | quote }}
  {{- range $k, $v := .Values.gateway.apiKeys }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
