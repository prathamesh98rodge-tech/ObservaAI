# Alembic configuration for ObservaAI Gateway
# Run: alembic upgrade head
# From: apps/gateway/ directory

[alembic]
script_location = alembic
prepend_sys_path = .

# sqlalchemy.url is overridden in env.py via app.config.settings
sqlalchemy.url = sqlite+aiosqlite:///./observaai.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
