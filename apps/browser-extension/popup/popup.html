<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ObservaAI Companion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      padding: 14px 16px 12px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      color: #111827;
      background: #fff;
    }
    header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    header h1 { font-size: 14px; font-weight: 600; }
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-green  { background: #22c55e; }
    .dot-red    { background: #ef4444; }
    .dot-gray   { background: #d1d5db; }

    table { width: 100%; border-collapse: collapse; }
    td { padding: 5px 0; }
    td:first-child { font-weight: 500; text-transform: capitalize; }
    td:last-child  { text-align: right; font-size: 12px; color: #6b7280; }
    tr:not(:last-child) td { border-bottom: 1px solid #f3f4f6; }
    .ok   { color: #16a34a; }
    .err  { color: #dc2626; }
    .never{ color: #9ca3af; }

    footer {
      margin-top: 12px;
      font-size: 11px;
      color: #9ca3af;
      display: flex;
      justify-content: space-between;
    }
    footer a { color: #6b7280; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <span class="dot dot-gray" id="gw-dot"></span>
    <h1>ObservaAI Companion</h1>
  </header>

  <table id="providers">
    <tr><td colspan="2" style="color:#9ca3af">Loading…</td></tr>
  </table>

  <footer>
    <span id="gw-label">localhost:8000</span>
    <a id="options-link" href="#">Settings</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
