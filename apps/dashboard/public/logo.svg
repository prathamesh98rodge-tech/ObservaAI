<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- dark background -->
  <rect width="128" height="128" rx="20" fill="#0f172a"/>

  <!-- signal arcs left -->
  <path d="M 36 68 A 20 20 0 0 1 36 44" fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
  <path d="M 26 76 A 34 34 0 0 1 26 36" fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>

  <!-- signal arcs right -->
  <path d="M 92 68 A 20 20 0 0 0 92 44" fill="none" stroke="#06b6d4" stroke-width="4" stroke-linecap="round"/>
  <path d="M 102 76 A 34 34 0 0 0 102 36" fill="none" stroke="#0891b2" stroke-width="4" stroke-linecap="round"/>

  <!-- lighthouse body -->
  <polygon points="42,96 86,96 74,42 54,42" fill="#1e3a5f"/>

  <!-- analytics bars (clipped inside lighthouse) -->
  <clipPath id="c"><polygon points="42,96 86,96 74,42 54,42"/></clipPath>
  <g clip-path="url(#c)">
    <rect x="45" y="66" width="12" height="30" fill="#06b6d4" opacity="0.9"/>
    <rect x="59" y="74" width="12" height="22" fill="#22c55e" opacity="0.9"/>
    <rect x="73" y="80" width="10" height="16" fill="#65a30d" opacity="0.85"/>
  </g>

  <!-- balcony -->
  <rect x="52" y="42" width="24" height="5" rx="1.5" fill="#1e3a5f"/>

  <!-- lantern room -->
  <rect x="57" y="24" width="14" height="18" rx="2" fill="#1e3a5f"/>
  <rect x="59" y="27" width="4" height="7" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="65" y="27" width="4" height="7" rx="0.5" fill="white" opacity="0.9"/>

  <!-- lantern roof -->
  <polygon points="64,14  75,24  53,24" fill="#1e3a5f"/>

  <!-- base platform -->
  <rect x="36" y="96" width="56" height="6" rx="2" fill="#1e3a5f"/>

  <!-- text: AI -->
  <text x="64" y="120" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
        font-size="11" font-weight="800" fill="#0ea5e9" letter-spacing="1">ObservaAI</text>
</svg>
